name: "Run docker"

on: 
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    name: docker
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -t my-app:latest .

      - name: Run container
        run: |
          docker run -d --name my-container my-app
    
      